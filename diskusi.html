<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Forum Diskusi - CorelDRAW</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

/* RESET */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Poppins', sans-serif;
    background:#0f172a;
    color:white;
}

/* BACK BUTTON */
.back-icon{
    position:fixed;
    top:20px;
    left:20px;

    width:50px;
    height:50px;

    display:flex;
    justify-content:center;
    align-items:center;

    background:rgba(255,255,255,0.08);
    border:1px solid rgba(255,255,255,0.15);
    border-radius:50%;

    color:white;
    font-size:22px;
    text-decoration:none;

    backdrop-filter:blur(10px);

    transition:0.3s;
    z-index:1000;
}

.back-icon:hover{
    background:rgba(124,58,237,0.4);
    transform:scale(1.1);
}

/* CONTAINER */
.container{
    max-width:900px;
    margin:80px auto;
    padding:20px;
}

/* HEADER */
h1{
    text-align:center;
    font-size:36px;
    margin-bottom:10px;
}

.subtitle{
    text-align:center;
    opacity:0.8;
    margin-bottom:30px;
}

/* INPUT */
.input-box{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    padding:20px;
    border-radius:15px;
    backdrop-filter:blur(10px);
    margin-bottom:25px;
}

textarea{
    width:100%;
    height:90px;
    padding:12px;
    border-radius:10px;
    border:none;
    outline:none;
    resize:none;
    font-family:'Poppins';
}

button{
    margin-top:10px;
    padding:10px 18px;
    border:none;
    border-radius:20px;
    cursor:pointer;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    font-weight:600;
}

/* COMMENT BOX */
.comment{
    background:rgba(255,255,255,0.06);
    border:1px solid rgba(255,255,255,0.12);
    padding:15px;
    border-radius:15px;
    margin-bottom:15px;
}

.meta{
    font-size:13px;
    opacity:0.7;
    margin-bottom:8px;
}

/* ACTIONS */
.actions{
    margin-top:10px;
    display:flex;
    gap:15px;
    font-size:14px;
}

.actions span{
    cursor:pointer;
    opacity:0.8;
}

.actions span:hover{
    opacity:1;
}

/* REPLY */
.reply-box{
    margin-top:10px;
    margin-left:20px;
    padding-left:10px;
    border-left:2px solid rgba(255,255,255,0.2);
}

.reply{
    margin-top:8px;
    font-size:14px;
    opacity:0.9;
}

.small-input{
    margin-top:10px;
    display:none;
}

.small-input textarea{
    height:60px;
    font-size:13px;
}

</style>
</head>

<body>

<!-- BACK BUTTON -->
<a href="index.html" class="back-icon">←</a>

<div class="container">

    <h1>Forum Diskusi CorelDRAW</h1>
    <p class="subtitle">Diskusi Materi Multimedia Desain Grafis</p>

    <!-- INPUT -->
    <div class="input-box">
        <textarea id="commentInput" placeholder="Tulis komentar..."></textarea>
        <button onclick="addComment()">Kirim</button>
    </div>

    <!-- COMMENT LIST -->
    <div id="commentList"></div>

</div>

<script>

let comments = JSON.parse(localStorage.getItem("comments")) || [];

// SAVE
function saveData(){
    localStorage.setItem("comments", JSON.stringify(comments));
}

// RENDER
function render(){
    let list = document.getElementById("commentList");
    list.innerHTML = "";

    comments.forEach((c, index)=>{

        let repliesHTML = "";

        c.replies.forEach(r=>{
            repliesHTML += `<div class="reply">↳ ${r}</div>`;
        });

        list.innerHTML += `
        <div class="comment">
            <div class="meta">User • sekarang</div>
            <div>${c.text}</div>

            <div class="actions">
                <span onclick="likeComment(${index})">👍 Like (${c.likes})</span>
                <span onclick="toggleReply(${index})">💬 Reply</span>
            </div>

            <div class="reply-box">

                ${repliesHTML}

                <div class="small-input" id="replyBox-${index}">
                    <textarea id="replyInput-${index}" placeholder="Balas komentar..."></textarea>
                    <button onclick="addReply(${index})">Kirim</button>
                </div>

            </div>
        </div>
        `;
    });

    saveData();
}

// ADD COMMENT
function addComment(){
    let input = document.getElementById("commentInput");

    if(input.value.trim() === "") return;

    comments.push({
        text: input.value,
        likes: 0,
        replies: []
    });

    input.value = "";
    render();
}

// LIKE
function likeComment(index){
    comments[index].likes++;
    render();
}

// TOGGLE REPLY
function toggleReply(index){
    let box = document.getElementById(`replyBox-${index}`);
    box.style.display = box.style.display === "block" ? "none" : "block";
}

// ADD REPLY
function addReply(index){
    let input = document.getElementById(`replyInput-${index}`);

    if(input.value.trim() === "") return;

    comments[index].replies.push(input.value);

    input.value = "";
    render();
}

// INIT
render();

</script>

</body>
</html>
