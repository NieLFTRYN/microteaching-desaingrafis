<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Komentar Pengunjung</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat', sans-serif;
    background:#0d0d0f;
    color:white;
    padding:40px 20px;
}

.container{
    max-width:900px;
    margin:auto;
}

h1{
    text-align:center;
    margin-bottom:30px;
}

h1 span{
    color:#9f72ff;
}

/* FORM */
.comment-box{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:25px;
    padding:25px;
    margin-bottom:30px;
}

input, textarea{
    width:100%;
    padding:15px;
    border:none;
    border-radius:14px;
    margin-bottom:15px;
    background:rgba(255,255,255,.06);
    color:white;
    outline:none;
}

textarea{
    resize:none;
    height:120px;
}

.emotes{
    display:flex;
    gap:10px;
    margin-bottom:20px;
    flex-wrap:wrap;
}

.emoji{
    background:#1f1f25;
    border:none;
    border-radius:12px;
    padding:10px 14px;
    cursor:pointer;
    font-size:22px;
}

button.submit{
    background:#5b2a86;
    border:none;
    color:white;
    padding:14px 24px;
    border-radius:14px;
    cursor:pointer;
    font-weight:600;
}

/* COMMENT */
.comment{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:22px;
    padding:20px;
    margin-bottom:20px;
}

.comment h3{
    margin-bottom:10px;
}

.comment p{
    color:#d7d7d7;
    line-height:1.7;
}

.reaction{
    display:flex;
    gap:12px;
    margin-top:15px;
}

.reaction button{
    border:none;
    background:#1c1c21;
    color:white;
    padding:10px 16px;
    border-radius:12px;
    cursor:pointer;
}

</style>
</head>
<body>

<div class="container">

<h1>Kolom <span>Komentar</span></h1>

<div class="comment-box">

<input type="text" id="nama" placeholder="Nama Anda">

<textarea id="komentar"
placeholder="Tulis komentar..."></textarea>

<div class="emotes">
    <button class="emoji" onclick="addEmoji('😀')">😀</button>
    <button class="emoji" onclick="addEmoji('😍')">😍</button>
    <button class="emoji" onclick="addEmoji('🔥')">🔥</button>
    <button class="emoji" onclick="addEmoji('👍')">👍</button>
    <button class="emoji" onclick="addEmoji('🎓')">🎓</button>
</div>

<button class="submit"
onclick="kirimKomentar()">
Kirim Komentar
</button>

</div>

<div id="listKomentar"></div>

</div>

<script>

function addEmoji(emoji){
    const textarea =
    document.getElementById("komentar");

    textarea.value += emoji;
}

async function kirimKomentar(){

    const nama =
    document.getElementById("nama").value;

    const komentar =
    document.getElementById("komentar").value;

    if(nama === "" || komentar === ""){
        alert("Isi nama dan komentar dulu");
        return;
    }

    const data = {
        nama:nama,
        komentar:komentar
    };

    await fetch("save_comment.php",{
        method:"POST",
        headers:{
            "Content-Type":"application/json"
        },
        body:JSON.stringify(data)
    });

    tampilKomentar(nama, komentar);

    document.getElementById("nama").value="";
    document.getElementById("komentar").value="";
}

function tampilKomentar(nama, komentar){

    const div =
    document.createElement("div");

    div.classList.add("comment");

    div.innerHTML = `
        <h3>${nama}</h3>
        <p>${komentar}</p>

        <div class="reaction">
            <button onclick="like(this)">
                👍 <span>0</span>
            </button>

            <button onclick="dislike(this)">
                👎 <span>0</span>
            </button>
        </div>
    `;

    document
    .getElementById("listKomentar")
    .prepend(div);
}

function like(button){

    let span =
    button.querySelector("span");

    span.innerText =
    parseInt(span.innerText)+1;
}

function dislike(button){

    let span =
    button.querySelector("span");

    span.innerText =
    parseInt(span.innerText)+1;
}

</script>

</body>
</html>
