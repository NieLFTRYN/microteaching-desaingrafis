<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Jelajahi Ruangan</title>

<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family:'Montserrat', sans-serif;
    background:#0d0d0f;
    color:white;
    overflow-x:hidden;
}

/* BACKGROUND */
.background-grid{
    position:fixed;
    inset:0;
    background:
    linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size:35px 35px;
    z-index:-2;
}

.blur-purple{
    position:fixed;
    width:min(350px,50vw);
    height:min(350px,50vw);
    background:#4b1f73;
    border-radius:50%;
    filter:blur(120px);
    opacity:.25;
    top:-100px;
    right:-100px;
    z-index:-1;
}

/* CONTAINER */
.container{
    width:min(92%,1400px);
    margin:auto;
    padding:40px 0;
}

/* TOP */
.top-bar{
    display:flex;
    justify-content:space-between;
    align-items:center;
    gap:20px;
    margin-bottom:35px;
}

.title h1{
    font-size:clamp(2rem,5vw,3rem);
}

.title span{
    color:#9f72ff;
}

/* BUTTON KEMBALI */
.back-btn{
    text-decoration:none;
    background:#5b2a86;
    color:white;
    padding:14px 24px;
    border-radius:14px;
    transition:.3s;
    white-space:nowrap;
}

.back-btn:hover{
    background:#7443ad;
}

/* PILIH RUANGAN */
.room-buttons{
    display:flex;
    gap:15px;
    flex-wrap:wrap;
    margin-bottom:35px;
}

.room-buttons button{
    border:none;
    cursor:pointer;
    padding:14px 24px;
    border-radius:14px;
    background:rgba(255,255,255,.05);
    color:white;
    transition:.3s;
    font-size:clamp(14px,2vw,16px);
}

.room-buttons button:hover{
    background:#5b2a86;
}

/* CARD */
.room-card{
    background:rgba(255,255,255,.04);
    border:1px solid rgba(255,255,255,.08);
    border-radius:32px;
    overflow:hidden;

    display:grid;
    grid-template-columns:1.1fr .9fr;

    backdrop-filter:blur(20px);
}

/* IMAGE */
.room-image{
    min-height:320px;
}

.room-image img{
    width:100%;
    height:100%;
    object-fit:cover;
}

/* CONTENT */
.room-content{
    padding:clamp(25px,4vw,50px);
    display:flex;
    flex-direction:column;
    justify-content:center;
}

.room-content h2{
    font-size:clamp(2rem,4vw,3rem);
    margin-bottom:20px;
}

.room-content span{
    color:#9f72ff;
}

.room-content p{
    color:#cccccc;
    line-height:1.9;
    font-size:clamp(14px,2vw,17px);
    margin-bottom:30px;
}

/* BUTTON */
.room-btn{
    width:fit-content;
    text-decoration:none;
    background:#5b2a86;
    color:white;
    padding:15px 28px;
    border-radius:14px;
    transition:.3s;
}

.room-btn:hover{
    background:#7443ad;
    transform:translateY(-3px);
}

/* TABLET */
@media(max-width:992px){

    .room-card{
        grid-template-columns:1fr;
    }

    .room-image{
        height:350px;
    }

    .room-content{
        text-align:center;
        align-items:center;
    }
}

/* HP */
@media(max-width:600px){

    .top-bar{
        flex-direction:column;
        text-align:center;
    }

    .room-buttons{
        flex-direction:column;
    }

    .room-buttons button{
        width:100%;
    }

    .room-image{
        height:260px;
    }

    .room-card{
        border-radius:24px;
    }

    .back-btn{
        width:100%;
        text-align:center;
    }

    .room-btn{
        width:100%;
        text-align:center;
    }
}

</style>
</head>
<body>

<div class="background-grid"></div>
<div class="blur-purple"></div>

<div class="container">

    <!-- HEADER -->
    <div class="top-bar">

        <div class="title">
            <h1>Jelajahi <span>Ruangan</span></h1>
        </div>

        <a href="index.html" class="back-btn">
            ← Kembali
        </a>

    </div>

    <!-- PILIH RUANGAN -->
    <div class="room-buttons">

        <button onclick="showRoom('cinema')">
            Ruang Cinema
        </button>

        <button onclick="showRoom('podcast')">
            Ruang Podcast
        </button>

        <button onclick="showRoom('editing')">
            Ruang Editing
        </button>

    </div>

    <!-- CARD -->
    <div class="room-card">

        <div class="room-image">
            <img id="roomImage"
            src="ruangcinema.jpg"
            alt="Ruangan Cinema">
        </div>

        <div class="room-content">

            <h2 id="roomTitle">
                Ruangan <span>Cinema</span>
            </h2>

            <p id="roomDesc">
                Ruangan Cinema merupakan fasilitas multimedia
                untuk pemutaran video pembelajaran, simulasi media,
                presentasi audiovisual, dan kegiatan pembelajaran
                berbasis teknologi pendidikan.
            </p>

            <a href="barang-cinema.html"
            class="room-btn"
            id="roomBtn">
                Lihat Barang Tersedia
            </a>

        </div>

    </div>

</div>

<script>

function showRoom(room){

const image = document.getElementById("roomImage");
const title = document.getElementById("roomTitle");
const desc = document.getElementById("roomDesc");
const btn = document.getElementById("roomBtn");

if(room === "cinema"){

image.src = "cinema.jpg";

title.innerHTML =
'Ruangan <span>Cinema</span>';

desc.innerHTML =
'Ruangan Cinema merupakan fasilitas multimedia untuk pemutaran video pembelajaran, simulasi media, presentasi audiovisual, dan kegiatan pembelajaran berbasis teknologi pendidikan.';

btn.href =
"barang-cinema.html";
}

else if(room === "podcast"){

image.src = "podcast.jpg";

title.innerHTML =
'Ruangan <span>Podcast</span>';

desc.innerHTML =
'Ruangan Podcast digunakan untuk pembuatan audio pembelajaran, voice over media pendidikan, rekaman podcast edukasi, serta komunikasi digital.';

btn.href =
"barang-podcast.html";
}

else if(room === "editing"){

image.src = "editing.jpg";

title.innerHTML =
'Ruangan <span>Editing</span>';

desc.innerHTML =
'Ruangan Editing digunakan untuk editing video pembelajaran, multimedia pendidikan, desain media digital, dan pengembangan konten edukasi.';

btn.href =
"barang-editing.html";
}

}

</script>

</body>
</html>
