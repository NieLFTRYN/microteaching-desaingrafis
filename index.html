<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Microteaching Desain Grafis - Fase F</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
    
    <style>
        /* Base & Reset Styles */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #F8FAFC; /* Putih abu-abu bersih, kontras tinggi */
            color: #0F172A;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            position: relative;
        }

        /* Background Dekorasi Gambar Tema Desain Grafis */
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 120, 212, 0.04) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 120, 212, 0.04) 1px, transparent 1px);
            background-size: 24px 24px;
            z-index: 0;
            pointer-events: none;
        }

        body::after {
            content: '';
            position: absolute;
            width: 700px;
            height: 700px;
            border: 2px dashed rgba(0, 120, 212, 0.08);
            border-radius: 50%;
            bottom: -150px;
            right: -150px;
            z-index: 0;
            pointer-events: none;
        }

        /* Navigation Bar (Efek Glossy Premium) */
        nav {
            background: linear-gradient(180deg, #0086F0 0%, #0066B3 100%); /* Gradasi Biru */
            padding: 14px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: 0 4px 25px rgba(0, 102, 179, 0.25);
            border-bottom: 4px solid #004D85;
            z-index: 10;
            gap: 30px;
            position: relative;
        }

        /* Lapisan Efek Glossy / Kilau Cahaya */
        nav::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.25) 0%, rgba(255, 255, 255, 0) 100%);
            pointer-events: none;
        }

        .logo-container {
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: rgba(255, 255, 255, 0.9); /* Box putih solid tipis agar logo ULM & Tekpend terlihat jelas */
            padding: 6px 12px;
            border-radius: 8px;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            height: 55px;
        }

        .logo-container img {
            height: 42px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        /* Container Teks Berjalan di Tengah Navbar */
        .nav-marquee {
            flex: 1;
            background-color: #001524; /* Biru gelap pekat agar teks mencolok */
            color: #FFFFFF;
            padding: 10px 0;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.9rem;
            overflow: hidden;
            white-space: nowrap;
            box-shadow: inset 0 2px 6px rgba(0,0,0,0.4), 0 1px 2px rgba(255,255,255,0.2);
            max-width: 650px;
            margin: 0 auto;
            border: 1px solid rgba(255, 255, 255, 0.1);
            display: flex;
            align-items: center;
        }

        .marquee-text {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 14s linear infinite;
        }

        @keyframes marquee {
            0% { transform: translate3d(0, 0, 0); }
            100% { transform: translate3d(-100%, 0, 0); }
        }

        /* Hero / Main Content */
        .main-content {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 50px 20px;
            z-index: 1;
        }

        .graphics-ornament {
            position: absolute;
            top: 25%;
            left: 8%;
            width: 90px;
            height: 90px;
            background: linear-gradient(135deg, rgba(0, 120, 212, 0.12), rgba(0, 238, 214, 0.12));
            border-radius: 24px 0 24px 24px;
            transform: rotate(15deg);
            z-index: 0;
            pointer-events: none;
            border: 2px dashed rgba(0, 120, 212, 0.2);
        }

        .container {
            text-align: center;
            max-width: 850px;
            width: 100%;
            background-color: rgba(255, 255, 255, 0.92);
            padding: 50px 40px;
            border-radius: 20px;
            backdrop-filter: blur(8px);
            box-shadow: 0 20px 40px rgba(15, 23, 42, 0.06);
            border: 1px solid rgba(255, 255, 255, 0.7);
        }

        .badge {
            background-color: #E6F4FF;
            color: #0066B3;
            padding: 8px 20px;
            border-radius: 20px;
            font-size: 0.9rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            display: inline-block;
            margin-bottom: 30px;
            border: 1px solid rgba(0, 120, 212, 0.15);
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 400;
            color: #0F172A;
            line-height: 1.3;
            margin-bottom: 20px;
        }

        h1 span {
            font-weight: 700;
            color: #0078D4;
            display: block;
            font-size: 3.6rem;
            margin-top: 5px;
            text-shadow: 0 2px 10px rgba(0, 120, 212, 0.1);
        }

        p {
            font-size: 1.15rem;
            color: #475569;
            margin-bottom: 50px;
            font-weight: 400;
            line-height: 1.6;
        }

        /* Button Group & Animations */
        .button-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 18px;
        }

        /* Tombol Mulai (Glossy Blue Button) */
        .btn-start {
            font-family: 'Montserrat', sans-serif;
            font-weight: 700;
            font-size: 1.25rem;
            color: #FFFFFF;
            background: linear-gradient(180deg, #0086F0 0%, #0066B3 100%);
            border: none;
            padding: 18px 65px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 6px 20px rgba(0, 102, 179, 0.4);
            text-transform: uppercase;
            letter-spacing: 1px;
            width: 100%;
            max-width: 360px;
            position: relative;
            overflow: hidden;
        }

        .btn-start::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50%;
            background: linear-gradient(180deg, rgba(255, 255, 255, 0.2) 0%, rgba(255, 255, 255, 0) 100%);
        }

        .btn-start:hover {
            background: linear-gradient(180deg, #1A94FF 0%, #0073CC 100%);
            box-shadow: 0 8px 25px rgba(0, 102, 179, 0.5);
            transform: translateY(-2px);
        }

        .sub-buttons {
            display: flex;
            gap: 18px;
            width: 100%;
            max-width: 480px;
            margin-top: 5px;
        }

        /* Tombol Sekunder */
        .btn-secondary {
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            font-size: 0.95rem;
            color: #005A9E;
            background-color: #FFFFFF;
            border: 2px solid #0066B3;
            padding: 14px 22px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            flex: 1;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.02);
        }

        .btn-secondary:hover {
            background-color: #0066B3;
            color: #FFFFFF;
            box-shadow: 0 6px 15px rgba(0, 102, 179, 0.2);
            transform: translateY(-1px);
        }

        /* Efek Giggle / Shake Animasi ala Game */
        .giggle {
            animation: giggleAnimation 0.4s ease-in-out;
        }

        @keyframes giggleAnimation {
            0% { transform: scale(1); }
            20% { transform: scale(0.92) rotate(-3deg); }
            40% { transform: scale(1.06) rotate(3deg); }
            60% { transform: scale(0.96) rotate(-2deg); }
            80% { transform: scale(1.02) rotate(2deg); }
            100% { transform: scale(1) rotate(0deg); }
        }

        /* Responsive Breakpoints */
        @media (max-width: 768px) {
            nav { flex-direction: column; gap: 15px; padding: 20px; }
            .nav-marquee { width: 100%; }
            h1 { font-size: 2.2rem; }
            h1 span { font-size: 2.8rem; }
            .sub-buttons { flex-direction: column; gap: 12px; width: 100%; max-width: 360px; }
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo-container">
            <img src="logo-ULM.png" alt="Logo Kampus">
        </div>
        
        <div class="nav-marquee">
            <div class="marquee-text">
                selamat datang di Desain Grafis Multimedia, selamat berjuang, sukses!!! &nbsp;&nbsp;&nbsp;&nbsp;•&nbsp;&nbsp;&nbsp;&nbsp; selamat datang di Desain Grafis Multimedia, selamat berjuang, sukses!!!
            </div>
        </div>
        
        <div class="logo-container">
            <div class="img-container">
                <img src="logo-TEKPEND.png" alt="Logo Prodi">
            </div>
        </div>
    </nav>

    <div class="graphics-ornament"></div>

    <main class="main-content">
        <div class="container">
            <div class="badge">SMK Kelas XI • Fase F</div>
            
            <h1>Microteaching Pembelajaran <span>Desain Grafis</span></h1>
            <p>Media interaktif pembelajaran berbasis elemen gambar bitmap dan vektor.</p>
            
            <div class="button-group">
                <button class="btn-start" onclick="navigateWithGiggle(this, 'mulaimateri.html')">Mulai</button>
                
                <div class="sub-buttons">
                    <button class="btn-secondary" onclick="navigateWithGiggle(this, 'rencanapembelajaran.html')">Rencana Pembelajaran</button>
                    <button class="btn-secondary" onclick="navigateWithGiggle(this, 'alurpembelajaran.html')">Alur Pembelajaran</button>
                </div>
            </div>
        </div>
    </main>

    <script>
        function navigateWithGiggle(element, targetUrl) {
            // Tambahkan class animasi goyang (giggle)
            element.classList.add('giggle');
            
            // Tunggu 400ms (sampai animasi selesai), baru pindah halaman
            setTimeout(() => {
                element.classList.remove('giggle');
                window.location.href = targetUrl;
            }, 400);
        }
    </script>

</body>
</html>
