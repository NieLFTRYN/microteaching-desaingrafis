<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forum Diskusi</title>

<style>
body{
    font-family:Arial;
    background:#f4f7fb;
    margin:0;
}

header{
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    color:white;
    padding:20px;
    text-align:center;
}

.container{
    width:90%;
    max-width:800px;
    margin:auto;
    padding:20px;
}

.card{
    background:white;
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
    box-shadow:0 3px 10px rgba(0,0,0,0.1);
}

button{
    cursor:pointer;
    padding:8px 12px;
    border:none;
    border-radius:8px;
    margin-top:5px;
}

.like{
    background:#4f46e5;
    color:white;
}

.reply{
    background:#7c3aed;
    color:white;
}

.back{
    background:#111827;
    color:white;
    margin:10px;
}
</style>
</head>

<body>

<header>
    <h2>Forum Diskusi Multimedia</h2>
</header>

<!-- LOGIN -->
<div class="container" id="loginBox">
    <div class="card">
        <h3>Login Diskusi</h3>
        <input id="namaUser" placeholder="Masukkan nama panggilan..." style="width:100%;padding:10px;">
        <button onclick="login()">Masuk</button>
    </div>
</div>

<!-- FORUM -->
<div class="container" id="forumBox" style="display:none;">

<button class="back" onclick="kembali()">⬅ Kembali</button>

<div class="card">
    <h3>Tulis Diskusi</h3>
    <textarea id="postText" style="width:100%;height:80px;"></textarea>
    <button onclick="post()">Kirim</button>
</div>

<div id="posts"></div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, push, onValue, update } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

const firebaseConfig = {
    apiKey: "ISI_API",
    authDomain: "PROJECT.firebaseapp.com",
    databaseURL: "https://PROJECT-default-rtdb.firebaseio.com",
    projectId: "PROJECT",
    storageBucket: "PROJECT.appspot.com",
    messagingSenderId: "XXXX",
    appId: "XXXX"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let user = "";

window.login = function(){
    user = document.getElementById("namaUser").value;
    if(user === "") return alert("Isi nama dulu");

    document.getElementById("loginBox").style.display = "none";
    document.getElementById("forumBox").style.display = "block";
};

window.post = function(){
    const teks = document.getElementById("postText").value;

    push(ref(db,"forum/posts"),{
        nama:user,
        teks:teks,
        like:0
    });

    document.getElementById("postText").value = "";
};

const postsRef = ref(db,"forum/posts");

onValue(postsRef,(snapshot)=>{
    const data = snapshot.val();
    let html = "";

    for(let id in data){
        const p = data[id];

        html += `
        <div class="card">
            <b>${p.nama}</b>
            <p>${p.teks}</p>

            <button class="like" onclick="likePost('${id}',${p.like})">
                ❤️ Like (${p.like || 0})
            </button>

            <button class="reply" onclick="reply('${id}')">
                Reply
            </button>

            <div id="replyBox-${id}"></div>
        </div>
        `;
    }

    document.getElementById("posts").innerHTML = html;
});

window.likePost = function(id,like){
    update(ref(db,"forum/posts/"+id),{
        like: like + 1
    });
};

window.reply = function(id){
    const teks = prompt("Tulis reply:");

    if(!teks) return;

    push(ref(db,"forum/posts/"+id+"/replies"),{
        nama:user,
        teks:teks
    });
};

window.kembali = function(){
    window.location.href = "index.html";
};
</script>

</body>
</html>
